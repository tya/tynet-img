# Lima VM: kickstart server
# Runs the tynet-img scripts to extract, customize, and serve the Ubuntu 26.04
# netboot image over NFS + TFTP + HTTP.
#
# Uses socket_vmnet shared network so both VMs can communicate directly.
#
# Start: limactl start vms/kickstart.yaml
# Start: make start
#
# Shell: limactl shell kickstart
# Shell: make kickstart

vmType: vz
os: Linux
arch: aarch64

images:
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: 4
memory: "4GiB"
disk: "40GiB"

# Mount home read-write so the repo (~/src/tynet-img) is editable inside the VM.
# Lima defaults to read-only; override here.
mounts:
  - location: "~"
    writable: true
  - location: /tmp/lima
    writable: true
  - location: "~/src/tynet-img/tmp/cache"
    mountPoint: /var/cache/img
    writable: true
  - location: "~/src/tynet-img/tmp/exports"
    mountPoint: /exports/netboot
    writable: true
  # /exports/overlay intentionally NOT virtiofs-mounted: virtiofs doesn't support
  # stable NFS file handles, breaking NFS re-export. Overlay lives on the VM's
  # local disk instead. Data is not persisted to the Mac between VM restarts.

networks:
  - lima: shared

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      # Assign static IP on the shared network interface (lima0).
      # Ansible handles all package installation and service setup.
      printf '%s\n' \
        'network:' \
        '  version: 2' \
        '  ethernets:' \
        '    lima0:' \
        '      dhcp4: false' \
        '      addresses: [192.168.105.10/24]' \
        '      routes:' \
        '        - to: default' \
        '          via: 192.168.105.1' \
        > /etc/netplan/90-lima0-static.yaml
      netplan apply || true

message: |
  -----------------------------------------------------------------------
  kickstart VM is ready.

  Shell in:  limactl shell kickstart  (or: cd vms && make kickstart)
  Provision: cd vms && make provision

  Kickstart IP (static): 192.168.105.10

  After provisioning, test from the node VM:
    tftp 192.168.105.10 -c get testnode/vmlinuz
    sudo mount -t nfs 192.168.105.10:/exports/netboot/ubuntu-26.04 /mnt
    curl http://192.168.105.10:8000/testnode/meta-data
  -----------------------------------------------------------------------
