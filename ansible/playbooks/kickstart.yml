---
# Configure the kickstart host (vpn.tynet.us).
# Sets up TFTP, NFS, and the cloud-init HTTP service.
# Replaces the configure-tftp shell script.
#
# Usage:
#   ansible-playbook ansible/playbooks/kickstart.yml

- name: Configure kickstart host
  hosts: kickstart
  become: true
  roles:
    - kickstart
