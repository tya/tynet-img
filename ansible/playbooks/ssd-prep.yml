---
# Partition and format the USB SSD on each node for use as the overlay upper layer.
#
# Run this once per node after plugging in the SSD, while the node is booted
# (tmpfs overlay mode is fine). The SSD becomes active as the overlay upper on
# the next reboot, provided customize-img was run with overlay_dev=/dev/sda1.
#
# Usage:
#   ansible-playbook ansible/playbooks/ssd-prep.yml
#   ansible-playbook ansible/playbooks/ssd-prep.yml --limit pi2.tynet.us
#
# Safety: the filesystem task uses force=false (default), so it will not
# reformat a partition that already has a filesystem — safe to run repeatedly.

- name: Prepare USB SSD for overlay upper layer
  hosts: nodes
  become: true

  vars:
    ssd_device: /dev/sda
    ssd_partition: /dev/sda1

  tasks:
    - name: Check for USB SSD
      ansible.builtin.stat:
        path: "{{ ssd_device }}"
      register: ssd_stat

    - name: Abort if SSD not present
      ansible.builtin.fail:
        msg: "{{ ssd_device }} not found on {{ inventory_hostname }} — plug in the SSD first"
      when: not ssd_stat.stat.exists

    - name: Create GPT partition table and single ext4 partition
      community.general.parted:
        device: "{{ ssd_device }}"
        label: gpt
        number: 1
        state: present
        fs_type: ext4
        part_start: 0%
        part_end: 100%

    - name: Format partition as ext4 (skip if already formatted)
      community.general.filesystem:
        fstype: ext4
        dev: "{{ ssd_partition }}"
        opts: "-L overlayroot"
        force: false

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ ssd_partition }} ready on {{ inventory_hostname }} — reboot to activate SSD overlay"
