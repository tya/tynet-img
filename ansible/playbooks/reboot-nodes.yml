---
# Gracefully reboot all Pi nodes one at a time.
# Drains each node before rebooting and uncordons after it comes back up.
#
# Usage:
#   ansible-playbook ansible/playbooks/reboot-nodes.yml
#   ansible-playbook ansible/playbooks/reboot-nodes.yml --limit pi2

- name: Reboot nodes gracefully
  hosts: nodes
  become: true
  serial: 1

  tasks:
    - name: Drain node
      ansible.builtin.command: >
        microk8s kubectl drain {{ inventory_hostname_short }}
        --ignore-daemonsets --delete-emptydir-data --timeout=60s
      delegate_to: "{{ groups['kickstart'][0] }}"
      changed_when: true
      failed_when: false  # continue even if drain times out or node has no workloads

    - name: Reboot
      ansible.builtin.reboot:
        msg: "Rebooting for maintenance"
        reboot_timeout: 300

    - name: Uncordon node
      ansible.builtin.command: microk8s kubectl uncordon {{ inventory_hostname_short }}
      delegate_to: "{{ groups['kickstart'][0] }}"
      changed_when: true
