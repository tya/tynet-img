---
# Common tasks for Pi netboot nodes.

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname_short }}"

- name: Ensure ty user SSH authorized keys
  ansible.posix.authorized_key:
    user: ty
    state: present
    key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

# Deploy static SSH host key from 1Password so the node identity never changes
# across reboots, overlay resets, or SSD reformats.
- name: Deploy SSH host private key
  ansible.builtin.copy:
    content: "{{ lookup('pipe', 'op read \"op://Private/tynet infra ssh key/private key\"') }}\n"
    dest: /etc/ssh/ssh_host_ed25519_key
    owner: root
    group: root
    mode: '0600'
  notify: Restart sshd

- name: Deploy SSH host public key
  ansible.builtin.copy:
    content: "{{ lookup('pipe', 'op read \"op://Private/tynet infra ssh key/public key\"') }}\n"
    dest: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root
    group: root
    mode: '0644'
