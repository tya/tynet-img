---
# Kickstart host: TFTP, NFS, cloud-init service, and per-node export setup.
# customize-img handles image extraction/customization only; server config lives here.

- name: Install kickstart packages
  ansible.builtin.apt:
    name:
      - kpartx
      - wget
      - xz-utils
      - rsync
      - tftp-hpa
      - tftpd-hpa
      - nfs-kernel-server
      - rpcbind
      - make
      - golang-go
      - git
      - systemd-container
      - ansible
      - socat
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create TFTP root directory
  ansible.builtin.file:
    path: /srv/tftpboot
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'

- name: Create NFS netboot export directory
  ansible.builtin.file:
    path: /exports/netboot
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create base image netboot directory
  ansible.builtin.file:
    path: /exports/netboot/ubuntu-22.04
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create NFS overlay export directory
  ansible.builtin.file:
    path: /exports/overlay
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure tftpd-hpa
  ansible.builtin.template:
    src: tftpd-hpa.j2
    dest: /etc/default/tftpd-hpa
    owner: root
    group: root
    mode: '0644'
  notify: Restart tftpd-hpa

- name: Enable and start rpcbind
  ansible.builtin.service:
    name: rpcbind
    enabled: true
    state: started

- name: Enable and start nfs-server
  ansible.builtin.service:
    name: nfs-server
    enabled: true
    state: started

- name: Enable and start tftpd-hpa
  ansible.builtin.service:
    name: tftpd-hpa
    enabled: true
    state: started

- name: Install GitHub deploy key
  ansible.builtin.copy:
    src: "~/.ssh/github"
    dest: "/home/ty/.ssh/github"
    owner: ty
    group: ty
    mode: '0600'
  become: false

- name: Configure SSH to use deploy key for github.com
  ansible.builtin.copy:
    dest: "/home/ty/.ssh/config"
    content: |
      Host github.com
        IdentityFile ~/.ssh/github
        StrictHostKeyChecking accept-new
    owner: ty
    group: ty
    mode: '0600'
  become: false

- name: Clone or pull tynet-img repo
  ansible.builtin.git:
    repo: git@github.com:tya/tynet-img.git
    dest: "{{ repo_dir }}"
    version: main
    update: true
  become: false

- name: Check if serve-cloud-init binary is up to date
  ansible.builtin.command:
    cmd: make -q build
    chdir: "{{ repo_dir }}"
  become: false
  register: serve_cloud_init_build_check
  changed_when: false
  failed_when: serve_cloud_init_build_check.rc not in [0, 1]

- name: Build serve-cloud-init binary
  ansible.builtin.command:
    cmd: make build
    chdir: "{{ repo_dir }}"
  become: false
  changed_when: true
  when: serve_cloud_init_build_check.rc == 1

- name: Install serve-cloud-init systemd service
  ansible.builtin.template:
    src: serve-cloud-init.service.j2
    dest: /etc/systemd/system/serve-cloud-init.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart serve-cloud-init

- name: Enable and start serve-cloud-init
  ansible.builtin.service:
    name: serve-cloud-init
    enabled: true
    state: started

# Per-node server-side config — loops over the [nodes] inventory group.
# host_vars/<node>.yml must define: node_serial, nfs_fsid

- name: Create per-node overlay directories
  ansible.builtin.command:
    cmd: mkdir -p {{ groups['nodes'] | map('regex_replace', '^(.*)$', '/exports/overlay/\\1/upper /exports/overlay/\\1/work') | join(' ') }}
  changed_when: false

- name: Find netboot release directories
  ansible.builtin.find:
    paths: /exports/netboot
    file_type: directory
    recurse: false
  register: netboot_releases

- name: Write /etc/exports from template
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: '0644'
  notify: Reload NFS exports

# TFTP dirs are keyed by MAC address (TFTP_PREFIX=2 in Pi EEPROM).
# node_serial is kept in host_vars for the cloud-init URL (until Phase 2).
- name: Create per-node TFTP directories
  ansible.builtin.file:
    path: "/srv/tftpboot/{{ hostvars[node].node_mac }}"
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  when: hostvars[node].node_mac | length > 0

# Sync boot files per-node from each node's assigned nfs_release.
# Excludes cmdline.txt which is written separately per-node below.
# rsync --update skips files that haven't changed, so re-runs are fast.
- name: Sync boot files to per-node TFTP directory
  ansible.builtin.command:
    cmd: >
      rsync -a --update --exclude=cmdline.txt
      /exports/netboot/{{ hostvars[node].nfs_release }}/boot/
      /srv/tftpboot/{{ hostvars[node].node_mac }}/
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  changed_when: false
  when: hostvars[node].node_mac | length > 0

- name: Make boot files world-readable for tftpd
  ansible.builtin.command: chmod -R a+r /srv/tftpboot
  changed_when: false

# Write per-node cmdline.txt into each MAC-keyed TFTP dir.
# overlay_host must be the short hostname since NFS exports use short names.
# node_serial still used for cloud-init URL (Phase 2 will replace with IP-based lookup).
- name: Write per-node cmdline.txt
  ansible.builtin.copy:
    content: "console=serial0,115200 console=tty1 root=/dev/nfs nfsroot={{ kickstart_ip }}:/exports/netboot/{{ hostvars[node].nfs_release }},vers=3 ro ip=dhcp rootwait swiotlb=noforce overlay_host={{ node }} netconsole=6665@/eth0,6666@{{ kickstart_ip }}/{{ kickstart_mac }} ds=nocloud;s=http://{{ kickstart_ip }}:8000/{{ hostvars[node].node_serial }}/\n"
    dest: "/srv/tftpboot/{{ hostvars[node].node_mac }}/cmdline.txt"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  when: hostvars[node].node_mac | length > 0
  notify: Restart tftpd-hpa

- name: Remove leftover experiment artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/tftpboot-cmdline

- name: Install update-base systemd service
  ansible.builtin.template:
    src: update-base.service.j2
    dest: /etc/systemd/system/update-base.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Install update-base systemd timer
  ansible.builtin.template:
    src: update-base.timer.j2
    dest: /etc/systemd/system/update-base.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Enable and start update-base timer
  ansible.builtin.service:
    name: update-base.timer
    enabled: true
    state: started
