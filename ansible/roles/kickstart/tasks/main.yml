---
# Kickstart host: TFTP, NFS, cloud-init service, and per-node export setup.
# customize-img handles image extraction/customization only; server config lives here.

- name: Install kickstart packages
  ansible.builtin.apt:
    name:
      - kpartx
      - wget
      - xz-utils
      - rsync
      - tftp-hpa
      - tftpd-hpa
      - nfs-kernel-server
      - rpcbind
      - make
      - golang-go
      - git
      - systemd-container
      - ansible
    state: present
    update_cache: true

- name: Create TFTP root directory
  ansible.builtin.file:
    path: /srv/tftpboot
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'

- name: Create NFS netboot export directory
  ansible.builtin.file:
    path: /exports/netboot
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create base image netboot directory
  ansible.builtin.file:
    path: /exports/netboot/ubuntu-26.04
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create NFS overlay export directory
  ansible.builtin.file:
    path: /exports/overlay
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure tftpd-hpa
  ansible.builtin.template:
    src: tftpd-hpa.j2
    dest: /etc/default/tftpd-hpa
    owner: root
    group: root
    mode: '0644'
  notify: Restart tftpd-hpa

- name: Enable and start rpcbind
  ansible.builtin.service:
    name: rpcbind
    enabled: true
    state: started

- name: Enable and start nfs-server
  ansible.builtin.service:
    name: nfs-server
    enabled: true
    state: started

- name: Enable and start tftpd-hpa
  ansible.builtin.service:
    name: tftpd-hpa
    enabled: true
    state: started

- name: Install GitHub deploy key
  ansible.builtin.copy:
    src: "~/.ssh/github"
    dest: "/home/ty/.ssh/github"
    owner: ty
    group: ty
    mode: '0600'
  become: false

- name: Configure SSH to use deploy key for github.com
  ansible.builtin.copy:
    dest: "/home/ty/.ssh/config"
    content: |
      Host github.com
        IdentityFile ~/.ssh/github
        StrictHostKeyChecking accept-new
    owner: ty
    group: ty
    mode: '0600'
  become: false

- name: Clone or pull tynet-img repo
  ansible.builtin.git:
    repo: git@github.com:tya/tynet-img.git
    dest: "{{ repo_dir }}"
    version: main
    update: true
  become: false

- name: Build serve-cloud-init binary
  ansible.builtin.command:
    cmd: make build
    chdir: "{{ repo_dir }}"
  become: false
  changed_when: false

- name: Install serve-cloud-init systemd service
  ansible.builtin.template:
    src: serve-cloud-init.service.j2
    dest: /etc/systemd/system/serve-cloud-init.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart serve-cloud-init

- name: Enable and start serve-cloud-init
  ansible.builtin.service:
    name: serve-cloud-init
    enabled: true
    state: started

# Per-node server-side config — loops over the [nodes] inventory group.
# host_vars/<node>.yml must define: node_serial, nfs_fsid

- name: Create per-node overlay directories
  ansible.builtin.file:
    path: "/exports/overlay/{{ hostvars[node].inventory_hostname_short }}/{{ subdir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ groups['nodes'] | product(['upper', 'work']) | list }}"
  vars:
    node: "{{ item[0] }}"
    subdir: "{{ item[1] }}"

- name: Write /etc/exports from template
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: '0644'
  notify: Reload NFS exports

- name: Create per-node TFTP directories
  ansible.builtin.file:
    path: "/srv/tftpboot/{{ hostvars[node].node_serial }}"
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  when: hostvars[node].node_serial | default('TODO') != 'TODO'

- name: Check base image boot directory exists
  ansible.builtin.stat:
    path: /exports/netboot/ubuntu-26.04/boot
  register: kickstart_base_boot

- name: Bind-mount boot partition into TFTP directory
  ansible.posix.mount:
    path: "/srv/tftpboot/{{ hostvars[node].node_serial }}"
    src: /exports/netboot/ubuntu-26.04/boot
    fstype: none
    opts: defaults,bind
    state: mounted
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  when: kickstart_base_boot.stat.exists and hostvars[node].node_serial | default('TODO') != 'TODO'
  notify: Restart tftpd-hpa

- name: Make boot files world-readable for tftpd
  ansible.builtin.command: chmod -R a+r /exports/netboot/ubuntu-26.04/boot
  when: kickstart_base_boot.stat.exists
  changed_when: true
  notify: Restart tftpd-hpa

- name: Install update-base systemd service
  ansible.builtin.template:
    src: update-base.service.j2
    dest: /etc/systemd/system/update-base.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Install update-base systemd timer
  ansible.builtin.template:
    src: update-base.timer.j2
    dest: /etc/systemd/system/update-base.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Enable and start update-base timer
  ansible.builtin.service:
    name: update-base.timer
    enabled: true
    state: started
