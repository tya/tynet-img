---
# Kickstart host: TFTP, NFS, cloud-init service, and per-node export setup.
# serve-img handles image extraction/customization only; server config lives here.

- name: Create ty user
  user:
    name: ty
    groups: adm,sudo
    shell: /bin/bash
    create_home: yes

- name: Set ty user authorized SSH key
  authorized_key:
    user: ty
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAw3CX41Cr43qst3bCnB3FNM9DdfvnvCw+9b1dI042GG"

- name: Grant ty passwordless sudo
  copy:
    dest: /etc/sudoers.d/ty
    content: "ty ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'

- name: Install kickstart packages
  apt:
    name:
      - kpartx
      - wget
      - xz-utils
      - rsync
      - tftp-hpa
      - tftpd-hpa
      - nfs-kernel-server
      - rpcbind
      - make
      - golang-go
      - git
    state: present
    update_cache: yes

- name: Create TFTP root directory
  file:
    path: /srv/tftpboot
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'

- name: Create NFS netboot export directory
  file:
    path: /exports/netboot
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create NFS overlay export directory
  file:
    path: /exports/overlay
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure tftpd-hpa
  template:
    src: tftpd-hpa.j2
    dest: /etc/default/tftpd-hpa
    owner: root
    group: root
    mode: '0644'
  notify: restart tftpd-hpa

- name: Enable and start rpcbind
  service:
    name: rpcbind
    enabled: yes
    state: started

- name: Enable and start nfs-server
  service:
    name: nfs-server
    enabled: yes
    state: started

- name: Enable and start tftpd-hpa
  service:
    name: tftpd-hpa
    enabled: yes
    state: started

- name: Clone tynet-img repo
  git:
    repo: https://github.com/tya/tynet-img.git
    dest: "{{ repo_dir }}"
    version: main
    update: yes
  become: no

- name: Build serve-cloud-init binary
  command:
    cmd: make build
    chdir: "{{ repo_dir }}"
  become: no
  changed_when: false

- name: Install serve-cloud-init systemd service
  template:
    src: serve-cloud-init.service.j2
    dest: /etc/systemd/system/serve-cloud-init.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart serve-cloud-init

- name: Enable and start serve-cloud-init
  service:
    name: serve-cloud-init
    enabled: yes
    state: started

# Per-node server-side config — loops over the [nodes] inventory group.
# host_vars/<node>.yml must define: serial, node_ip, nfs_fsid

- name: Create per-node overlay directories
  file:
    path: "/exports/overlay/{{ hostvars[node].inventory_hostname_short }}/{{ subdir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ groups['nodes'] | product(['upper', 'work']) | list }}"
  vars:
    node: "{{ item[0] }}"
    subdir: "{{ item[1] }}"

- name: Export read-only NFS root (shared base image)
  lineinfile:
    path: /etc/exports
    line: "/exports/netboot/ubuntu-26.04 {{ hostvars[node].node_ip }}(ro,sync,no_subtree_check,no_root_squash,fsid=1)"
    create: yes
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  notify: reload nfs exports

- name: Export per-node NFS overlay (writable upper layer)
  lineinfile:
    path: /etc/exports
    line: "/exports/overlay/{{ hostvars[node].inventory_hostname_short }} {{ hostvars[node].node_ip }}(rw,sync,no_subtree_check,no_root_squash,fsid={{ hostvars[node].nfs_fsid }})"
    create: yes
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  notify: reload nfs exports

- name: Create per-node TFTP directories
  file:
    path: "/srv/tftpboot/{{ hostvars[node].serial }}"
    state: directory
    owner: tftp
    group: tftp
    mode: '0755'
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node

- name: Check base image boot directory exists
  stat:
    path: /exports/netboot/ubuntu-26.04/boot
  register: base_boot

- name: Bind-mount boot partition into TFTP directory
  mount:
    path: "/srv/tftpboot/{{ hostvars[node].serial }}"
    src: /exports/netboot/ubuntu-26.04/boot
    fstype: none
    opts: defaults,bind
    state: mounted
  loop: "{{ groups['nodes'] }}"
  loop_control:
    loop_var: node
  when: base_boot.stat.exists

- name: Install update-base systemd service
  template:
    src: update-base.service.j2
    dest: /etc/systemd/system/update-base.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Install update-base systemd timer
  template:
    src: update-base.timer.j2
    dest: /etc/systemd/system/update-base.timer
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable and start update-base timer
  service:
    name: update-base.timer
    enabled: yes
    state: started
